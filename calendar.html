<!DOCTYPE html>
<html lang="ja" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カレンダー</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:       #c0392b;
      --primary-dark:  #922b21;
      --primary-mid:   #a93226;
      --primary-light: #e74c3c;
    }
    * { font-family: 'Noto Sans JP', sans-serif; }
    body { box-sizing: border-box; }

    .bg-red-500, .hover\:bg-red-500:hover   { background-color: var(--primary)      !important; }
    .bg-red-600, .hover\:bg-red-600:hover   { background-color: var(--primary-mid)  !important; }
    .bg-red-700, .hover\:bg-red-700:hover   { background-color: var(--primary-dark) !important; }
    .from-red-700 { --tw-gradient-from: var(--primary-dark) !important; }
    .from-red-600 { --tw-gradient-from: var(--primary-mid)  !important; }
    .to-red-500   { --tw-gradient-to:   var(--primary)      !important; }
    .to-red-600   { --tw-gradient-to:   var(--primary-mid)  !important; }
    .text-red-600 { color: var(--primary-mid) !important; }
    .text-red-500 { color: var(--primary)     !important; }
    .focus\:ring-red-500:focus { --tw-ring-color: var(--primary) !important; }
    .border-red-500 { border-color: var(--primary) !important; }

    .modal-backdrop { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    .btn-primary { transition: all 0.2s ease; }
    .btn-primary:hover { transform: scale(1.02); }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .cal-day { min-height: 80px; }
    @media (max-width: 640px) { .cal-day { min-height: 56px; } }
    .event-pill {
      display: block; font-size: 11px; line-height: 1.3;
      padding: 1px 4px; border-radius: 3px; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; color: #fff; font-weight: 600;
    }

    #settings-menu, #settings-menu button { color: #374151; }
    #settings-menu .text-red-600   { color: #dc2626 !important; }
    #settings-menu .text-blue-600  { color: #2563eb !important; }
    #settings-menu .text-green-600 { color: #16a34a !important; }
  </style>
</head>
<body class="h-full bg-gray-50">

<!-- ローディング -->
<div id="loading-screen" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-[150] gap-4">
  <div class="text-5xl">📅</div>
  <div class="w-8 h-8 border-4 border-red-200 border-t-red-500 rounded-full animate-spin"></div>
</div>

<!-- ヘッダー -->
<header class="p-4">
  <div class="max-w-[750px] mx-auto bg-gradient-to-r from-red-700 to-red-600 text-white px-4 py-3 shadow-lg rounded-2xl">
    <div class="flex items-center gap-3">
      <span class="text-3xl shrink-0">📅</span>
      <div class="flex-1 min-w-0">
        <h1 id="app-team-name" class="font-black leading-tight" style="font-size:min(1.25rem,4.5vw);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">カレンダー</h1>
        <p class="text-xs text-white/80 mt-0.5" style="letter-spacing:0.12em">CALENDAR</p>
      </div>
      <div class="relative shrink-0">
        <button id="settings-btn" type="button"
          class="bg-white/15 hover:bg-white/25 text-white text-lg rounded-lg px-3 py-2 transition-colors">⚙️</button>
        <div id="settings-menu" class="hidden absolute right-0 top-full mt-2 w-52 bg-white text-gray-800 rounded-xl shadow-xl border border-gray-200 overflow-hidden z-40">
          <button type="button" onclick="openSetupModal()"
            class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 transition-colors text-red-600 font-bold">⚙️ 接続設定</button>
          <button type="button" id="menu-login-btn" onclick="openLoginModal()"
            class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 transition-colors border-t border-gray-100 text-blue-600 font-bold">🔑 管理者ログイン</button>
          <button type="button" id="menu-logout-btn" onclick="handleLogout()"
            class="hidden w-full text-left px-4 py-3 text-sm hover:bg-gray-50 transition-colors border-t border-gray-100 font-bold">🚪 ログアウト</button>
          <button type="button" id="menu-admin-link-btn" onclick="openAdminLinkModal()"
            class="hidden w-full text-left px-4 py-3 text-sm hover:bg-gray-50 transition-colors border-t border-gray-100 text-red-600 font-bold">🔧 管理者リンクを発行</button>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- メインコンテンツ -->
<main class="max-w-[750px] mx-auto px-4 pb-8 space-y-3">

  <!-- ビュー切り替え + 月ナビ + 追加ボタン -->
  <div class="bg-white rounded-2xl shadow border border-gray-200 px-4 py-3 flex items-center gap-2">
    <button id="btn-month" onclick="setView('month')"
      class="px-3 py-2 rounded-xl text-sm font-bold bg-red-500 text-white transition-colors">月表示</button>
    <button id="btn-list" onclick="setView('list')"
      class="px-3 py-2 rounded-xl text-sm font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">リスト</button>
    <div class="flex-1"></div>
    <button id="add-event-btn" onclick="openEventModal()"
      class="hidden shrink-0 bg-red-500 hover:bg-red-600 text-white font-bold px-3 py-2 rounded-xl text-sm transition-colors whitespace-nowrap">
      ＋ 追加
    </button>
    <button id="prev-btn" onclick="changeMonth(-1)"
      class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-600 text-lg transition-colors">‹</button>
    <span id="month-label" class="text-sm font-black text-gray-800 min-w-[80px] text-center"></span>
    <button id="next-btn" onclick="changeMonth(1)"
      class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-600 text-lg transition-colors">›</button>
    <button onclick="goToToday()"
      class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold px-2 py-1.5 rounded-lg transition-colors">今日</button>
  </div>

  <!-- カテゴリー凡例 -->
  <div id="cat-legend" class="flex flex-wrap gap-2 px-1"></div>

  <!-- 月表示 -->
  <div id="view-month">
    <div class="bg-white rounded-2xl shadow border border-gray-200 overflow-hidden">
      <div class="cal-grid border-b border-gray-100">
        <div class="text-center text-xs font-bold text-red-500 py-2">日</div>
        <div class="text-center text-xs font-bold text-gray-500 py-2">月</div>
        <div class="text-center text-xs font-bold text-gray-500 py-2">火</div>
        <div class="text-center text-xs font-bold text-gray-500 py-2">水</div>
        <div class="text-center text-xs font-bold text-gray-500 py-2">木</div>
        <div class="text-center text-xs font-bold text-gray-500 py-2">金</div>
        <div class="text-center text-xs font-bold text-blue-500 py-2">土</div>
      </div>
      <div id="cal-body" class="cal-grid"></div>
    </div>
  </div>

  <!-- リスト表示 -->
  <div id="view-list" class="hidden space-y-2">
    <div id="list-body"></div>
  </div>

</main>

<!-- フッター -->
<footer class="max-w-[750px] mx-auto px-4 pb-6 text-center">
  <p id="footer-text" class="text-xs text-gray-400">© CALENDAR</p>
</footer>


<!-- ══ イベント詳細モーダル ══════════════════════════════════════════════ -->
<div id="detail-modal" class="fixed inset-0 z-[100] hidden">
  <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeDetailModal()"></div>
  <div class="absolute inset-4 md:inset-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-sm bg-white rounded-2xl shadow-2xl overflow-auto max-h-full">
    <div id="detail-header" class="text-white px-6 py-5 rounded-t-2xl flex items-start justify-between gap-2">
      <div>
        <p id="detail-cat" class="text-xs font-bold text-white/80 mb-1"></p>
        <h2 id="detail-title" class="text-lg font-black leading-snug"></h2>
      </div>
      <button onclick="closeDetailModal()" class="text-white/70 hover:text-white text-2xl leading-none shrink-0 ml-2">×</button>
    </div>
    <div class="p-5 space-y-3">
      <div id="detail-info" class="space-y-1.5 text-sm text-gray-700"></div>
      <div id="detail-memo" class="hidden bg-amber-50 rounded-xl px-3 py-2 text-amber-800 text-sm"></div>
      <div class="flex gap-2 pt-2">
        <button onclick="downloadICS()"
          class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-xl text-sm transition-colors">
          📅 カレンダーに追加
        </button>
        <button id="detail-edit-btn" onclick="editCurrentEvent()"
          class="hidden bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2.5 px-4 rounded-xl text-sm transition-colors">
          ✏️ 編集
        </button>
        <button id="detail-delete-btn" onclick="deleteCurrentEvent()"
          class="hidden bg-red-50 hover:bg-red-100 text-red-600 font-bold py-2.5 px-3 rounded-xl text-sm transition-colors">
          🗑️
        </button>
      </div>
    </div>
  </div>
</div>


<!-- ══ イベント作成／編集モーダル ══════════════════════════════════════ -->
<div id="event-modal" class="fixed inset-0 z-[100] hidden">
  <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeEventModal()"></div>
  <div class="absolute inset-4 md:inset-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-lg bg-white rounded-2xl shadow-2xl overflow-auto max-h-full">
    <div class="bg-gradient-to-r from-red-700 to-red-600 text-white px-6 py-5 rounded-t-2xl flex items-center justify-between">
      <h2 id="event-modal-title" class="text-xl font-black">📅 イベントを追加</h2>
      <button onclick="closeEventModal()" class="text-white/70 hover:text-white text-2xl leading-none ml-3 shrink-0">×</button>
    </div>
    <div class="p-6 space-y-4">
      <input type="hidden" id="edit-event-id" />
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-1">タイトル <span class="text-red-500">*</span></label>
        <input id="ev-title" type="text"
          class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-500"
          placeholder="例：U8 TM" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">日付 <span class="text-red-500">*</span></label>
          <input id="ev-date" type="date"
            class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-500" />
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">時間</label>
          <input id="ev-time" type="text" placeholder="例：10:00〜12:00"
            class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-500" />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">カテゴリー</label>
          <select id="ev-category"
            class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-500">
            <option value="">なし</option>
            <option>U7</option><option>U8</option><option>U9</option>
            <option>U10</option><option>U11</option><option>U12</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">場所</label>
          <input id="ev-location" type="text" placeholder="例：〇〇グラウンド"
            class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-500" />
        </div>
      </div>
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-1">移動手段</label>
        <input id="ev-transport" type="text" placeholder="例：各自移動"
          class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-500" />
      </div>
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-1">メモ</label>
        <textarea id="ev-memo" rows="2" placeholder="備考など"
          class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 resize-none"></textarea>
      </div>
      <div id="event-modal-status" class="hidden text-sm font-medium"></div>
      <button id="event-save-btn" onclick="saveEvent()"
        class="w-full text-white font-black py-3 rounded-xl transition-colors bg-red-500 hover:bg-red-600 btn-primary">
        <span id="event-save-text">保存する</span>
        <span id="event-save-loading" class="hidden">保存中…</span>
      </button>
    </div>
  </div>
</div>


<!-- ══ ログインモーダル ══════════════════════════════════════════════════ -->
<div id="login-modal" class="fixed inset-0 z-[200] hidden">
  <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeLoginModal()"></div>
  <div class="absolute inset-4 md:inset-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-sm bg-white rounded-2xl shadow-2xl overflow-auto max-h-full">
    <div class="bg-gradient-to-r from-red-700 to-red-600 text-white px-6 py-6 rounded-t-2xl text-center flex items-start justify-between">
      <div class="flex-1">
        <div class="text-4xl mb-2">📅</div>
        <h2 class="text-xl font-black">管理者ログイン</h2>
      </div>
      <button onclick="closeLoginModal()" class="text-white/70 hover:text-white text-2xl leading-none shrink-0">×</button>
    </div>
    <div class="p-6 space-y-4">
      <input id="login-email" type="email" placeholder="メールアドレス"
        class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-red-500" />
      <div class="relative">
        <input id="login-password" type="password" placeholder="パスワード"
          class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 pr-12 text-sm focus:outline-none focus:ring-2 focus:ring-red-500" />
        <button type="button" onclick="togglePw()"
          id="pw-eye" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg leading-none">👁</button>
      </div>
      <div id="login-status" class="hidden text-sm text-red-600 font-medium"></div>
      <button onclick="handleLogin()" id="login-btn-submit"
        class="w-full text-white font-black py-3 rounded-xl transition-colors bg-red-500 hover:bg-red-600 btn-primary">
        <span id="login-btn-text">ログイン</span>
        <span id="login-btn-load" class="hidden">ログイン中…</span>
      </button>
    </div>
  </div>
</div>


<!-- ══ 接続設定モーダル ══════════════════════════════════════════════════ -->
<div id="setup-modal" class="fixed inset-0 z-[200] hidden">
  <div class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
  <div class="absolute inset-4 md:inset-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-lg bg-white rounded-2xl shadow-2xl overflow-auto max-h-full">
    <div class="bg-gradient-to-r from-red-700 to-red-600 text-white px-6 py-5 rounded-t-2xl flex items-start justify-between">
      <div>
        <h2 class="text-xl font-black">⚙️ 接続設定</h2>
        <p class="text-sm text-white/80 mt-1">Supabaseの接続情報を入力してください</p>
      </div>
      <button onclick="closeSetupModal()" class="text-white/70 hover:text-white text-2xl leading-none ml-3 shrink-0">×</button>
    </div>
    <div class="p-6 space-y-4">
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-1">チーム名 <span class="text-red-500">*</span></label>
        <input type="text" id="setup-team" placeholder="○○サッカースクール"
          class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-red-500">
      </div>
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-1">Supabase URL <span class="text-red-500">*</span></label>
        <input type="url" id="setup-url" placeholder="https://xxxxxxxxxx.supabase.co"
          class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-gray-800 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-red-500" spellcheck="false">
      </div>
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-1">anon public キー <span class="text-red-500">*</span></label>
        <input type="text" id="setup-key" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
          class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-gray-800 font-mono text-xs focus:outline-none focus:ring-2 focus:ring-red-500" spellcheck="false">
      </div>
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-2">メインカラー</label>
        <div class="flex items-center gap-2 mb-3 p-2 bg-gray-50 rounded-xl border border-gray-200">
          <div id="cal-color-swatch" class="w-9 h-9 rounded-lg border border-gray-300 shadow-inner shrink-0" style="background:#c0392b"></div>
          <span id="cal-color-hex" class="text-sm font-mono font-bold text-gray-700 flex-1 uppercase">#C0392B</span>
          <label class="flex items-center gap-1.5 cursor-pointer bg-white border border-gray-300 hover:bg-gray-100 rounded-lg px-2.5 py-1.5 text-xs font-bold text-gray-600 transition-colors shrink-0">
            🎨 カスタム
            <input type="color" id="setup-primary-color" value="#c0392b" class="w-5 h-5 cursor-pointer border-0 p-0 bg-transparent" oninput="calSetColorPreview(this.value)">
          </label>
        </div>
        <div class="grid grid-cols-8 gap-1.5">
          <button type="button" onclick="calSetPresetColor('#b71c1c')" class="cal-color-preset w-full aspect-square rounded-md border border-black/10 hover:scale-110 transition-transform" style="background:#b71c1c" title="ダークレッド"></button>
          <button type="button" onclick="calSetPresetColor('#c0392b')" class="cal-color-preset w-full aspect-square rounded-md border border-black/10 hover:scale-110 transition-transform" style="background:#c0392b" title="レッド"></button>
          <button type="button" onclick="calSetPresetColor('#e53935')" class="cal-color-preset w-full aspect-square rounded-md border border-black/10 hover:scale-110 transition-transform" style="background:#e53935" title="ブライトレッド"></button>
          <button type="button" onclick="calSetPresetColor('#880e4f')" class="cal-color-preset w-full aspect-square rounded-md border border-black/10 hover:scale-110 transition-transform" style="background:#880e4f" title="ダークピンク"></button>
          <button type="button" onclick="calSetPresetColor('#4a148c')" class="cal-color-preset w-full aspect-square rounded-md border border-black/10 hover:scale-110 transition-transform" style="background:#4a148c" title="ダークパープル"></button>
          <button type="button" onclick="calSetPresetColor('#1a237e')" class="cal-color-preset w-full aspect-square rounded-md border border-black/10 hover:scale-110 transition-transform" style="background:#1a237e" title="ダークネイビー"></button>
          <button type="button" onclick="calSetPresetColor('#1565c0')" class="cal-color-preset w-full aspect-square rounded-md border border-black/10 hover:scale-110 transition-transform" style="background:#1565c0" title="ダークブルー"></button>
          <button type="button" onclick="calSetPresetColor('#0d47a1')" class="cal-color-preset w-full aspect-square rounded-md border border-black/10 hover:scale-110 transition-transform" style="background:#0d47a1" title="ロイヤルブルー"></button>
          <button type="button" onclick="calSetPresetColor('#006064')" class="cal-color-preset w-full aspect-square rounded-md border border-black/10 hover:scale-110 transition-transform" style="background:#006064" title="ダークシアン"></button>
          <button type="button" onclick="calSetPresetColor('#004d40')" class="cal-color-preset w-full aspect-square rounded-md border border-black/10 hover:scale-110 transition-transform" style="background:#004d40" title="ダークグリーン"></button>
          <button type="button" onclick="calSetPresetColor('#1b5e20')" class="cal-color-preset w-full aspect-square rounded-md border border-black/10 hover:scale-110 transition-transform" style="background:#1b5e20" title="フォレスト"></button>
          <button type="button" onclick="calSetPresetColor('#2e7d32')" class="cal-color-preset w-full aspect-square rounded-md border border-black/10 hover:scale-110 transition-transform" style="background:#2e7d32" title="グリーン"></button>
          <button type="button" onclick="calSetPresetColor('#e65100')" class="cal-color-preset w-full aspect-square rounded-md border border-black/10 hover:scale-110 transition-transform" style="background:#e65100" title="ダークオレンジ"></button>
          <button type="button" onclick="calSetPresetColor('#d35400')" class="cal-color-preset w-full aspect-square rounded-md border border-black/10 hover:scale-110 transition-transform" style="background:#d35400" title="オレンジ"></button>
          <button type="button" onclick="calSetPresetColor('#f39c12')" class="cal-color-preset w-full aspect-square rounded-md border border-black/10 hover:scale-110 transition-transform" style="background:#f39c12" title="アンバー"></button>
          <button type="button" onclick="calSetPresetColor('#6d4c41')" class="cal-color-preset w-full aspect-square rounded-md border border-black/10 hover:scale-110 transition-transform" style="background:#6d4c41" title="ブラウン"></button>
        </div>
      </div>
      <div id="setup-status" class="hidden text-sm font-medium"></div>
      <button onclick="saveSetup()"
        class="w-full text-white font-black py-3 rounded-xl transition-colors bg-red-500 hover:bg-red-600 btn-primary">
        保存して接続
      </button>
    </div>
  </div>
</div>


<!-- ══ 管理者リンク発行モーダル ══════════════════════════════════════════ -->
<div id="admin-link-modal" class="fixed inset-0 z-[200] hidden">
  <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeAdminLinkModal()"></div>
  <div class="absolute inset-4 md:inset-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-sm bg-white rounded-2xl shadow-2xl overflow-auto max-h-full">
    <div class="bg-gradient-to-r from-red-700 to-red-600 text-white px-6 py-5 rounded-t-2xl flex items-center justify-between">
      <h2 class="text-lg font-black">🔧 管理者リンクを発行</h2>
      <button onclick="closeAdminLinkModal()" class="text-white/70 hover:text-white text-2xl leading-none ml-3 shrink-0">×</button>
    </div>
    <div class="p-6 space-y-4">
      <p class="text-sm text-gray-600">接続設定済みの管理者用リンクを生成します。このリンクを開くと接続設定なしで即座に使用できます。</p>
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-1">アプリの公開URL <span class="text-red-500">*</span></label>
        <input type="url" id="admin-link-base-url" placeholder="https://your-site.netlify.app/calendar.html"
          class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-red-500" oninput="updateAdminLink()">
      </div>
      <div id="admin-link-output" class="hidden">
        <label class="block text-gray-700 text-sm font-bold mb-1">生成されたリンク</label>
        <div class="bg-gray-50 rounded-xl border border-gray-200 p-3 break-all text-xs text-gray-700 font-mono" id="admin-link-text"></div>
        <button onclick="copyAdminLink()"
          class="mt-2 w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2.5 rounded-xl text-sm transition-colors">
          📋 コピー
        </button>
        <p id="admin-link-copy-msg" class="hidden text-xs text-green-600 font-bold text-center mt-1">コピーしました！</p>
      </div>
    </div>
  </div>
</div>


<script>
  // ─── 定数 ────────────────────────────────────────────────────────────
  const STORAGE_CONFIG_KEY = 'mrs_app_config_v1'; // attendance.html と共用
  const TABLE_EVENTS = 'attendance_events';

  const CAT_COLORS = {
    'U7': '#8B5CF6', 'U8': '#3B82F6', 'U9': '#10B981',
    'U10': '#F59E0B', 'U11': '#F97316', 'U12': '#EF4444',
  };
  function catColor(cat) { return CAT_COLORS[cat] || '#6B7280'; }

  // ─── 状態 ────────────────────────────────────────────────────────────
  let supabaseClient = null;
  let events = [];
  let currentYear  = new Date().getFullYear();
  let currentMonth = new Date().getMonth(); // 0-indexed
  let viewMode = 'month';
  let currentDetailEvent = null;
  let isAdmin = false;

  // ─── 設定 ────────────────────────────────────────────────────────────
  function loadConfig() {
    try { return JSON.parse(localStorage.getItem(STORAGE_CONFIG_KEY) || 'null'); } catch(e) { return null; }
  }
  function saveConfig(cfg) {
    try { localStorage.setItem(STORAGE_CONFIG_KEY, JSON.stringify(cfg)); } catch(e) {}
  }
  function applyColor(hex) {
    if (!hex || !/^#[0-9a-fA-F]{6}$/.test(hex)) return;
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    const dark = `rgb(${Math.round(r*.75)},${Math.round(g*.75)},${Math.round(b*.75)})`;
    const mid  = `rgb(${Math.round(r*.88)},${Math.round(g*.88)},${Math.round(b*.88)})`;
    const root = document.documentElement;
    root.style.setProperty('--primary', hex);
    root.style.setProperty('--primary-dark', dark);
    root.style.setProperty('--primary-mid', mid);
  }

  function initSupabase() {
    const cfg = loadConfig();
    if (!cfg?.supabase_url || !cfg?.supabase_anon_key) return false;
    try {
      supabaseClient = window.supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key);
      if (cfg.team_name) {
        document.getElementById('app-team-name').textContent = cfg.team_name + ' カレンダー';
        document.title = cfg.team_name + ' カレンダー';
      }
      if (cfg.primary_color) applyColor(cfg.primary_color);
      return true;
    } catch(e) { return false; }
  }

  // ─── ハッシュ設定（管理者リンク対応） ───────────────────────────────
  function parseHashConfig() {
    try {
      const hash = location.hash.slice(1);
      if (!hash) return null;
      return JSON.parse(decodeURIComponent(escape(atob(hash))));
    } catch(e) { return null; }
  }
  function buildHashString(cfg) {
    const payload = { u: cfg.supabase_url, k: cfg.supabase_anon_key, t: cfg.team_name || '', c: cfg.primary_color || '#c0392b' };
    return btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  }
  function getBaseUrl() {
    return (location.protocol === 'file:' || location.origin === 'null')
      ? '' : location.origin + location.pathname;
  }

  // ─── 設定ドロップダウン ──────────────────────────────────────────────
  (function initSettingsMenu() {
    document.addEventListener('DOMContentLoaded', () => {
      const btn  = document.getElementById('settings-btn');
      const menu = document.getElementById('settings-menu');
      if (!btn || !menu) return;
      btn.addEventListener('click', e => {
        e.stopPropagation();
        menu.classList.toggle('hidden');
      });
      document.addEventListener('click', () => menu.classList.add('hidden'));
      menu.addEventListener('click', e => e.stopPropagation());
    });
  })();

  // ─── 認証 ────────────────────────────────────────────────────────────
  function openLoginModal() {
    document.getElementById('settings-menu')?.classList.add('hidden');
    document.getElementById('login-modal').classList.remove('hidden');
  }
  function closeLoginModal() { document.getElementById('login-modal').classList.add('hidden'); }

  function togglePw() {
    const i = document.getElementById('login-password');
    const b = document.getElementById('pw-eye');
    i.type = i.type === 'password' ? 'text' : 'password';
    b.textContent = i.type === 'password' ? '👁' : '🙈';
  }

  async function handleLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn      = document.getElementById('login-btn-submit');
    const txt      = document.getElementById('login-btn-text');
    const load     = document.getElementById('login-btn-load');
    const status   = document.getElementById('login-status');
    if (!email || !password) { showStatus(status, 'メールアドレスとパスワードを入力してください', 'error'); return; }
    btn.disabled = true; txt.classList.add('hidden'); load.classList.remove('hidden');
    try {
      const { error } = await Promise.race([
        supabaseClient.auth.signInWithPassword({ email, password }),
        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 30000))
      ]);
      if (error) { showStatus(status, 'メールアドレスまたはパスワードが違います', 'error'); return; }
      closeLoginModal();
      setAdminMode(true);
    } catch(e) {
      showStatus(status, e.message === 'timeout' ? 'タイムアウトしました' : 'ログインに失敗しました', 'error');
    } finally {
      btn.disabled = false; txt.classList.remove('hidden'); load.classList.add('hidden');
    }
  }

  async function handleLogout() {
    document.getElementById('settings-menu')?.classList.add('hidden');
    try { await Promise.race([supabaseClient.auth.signOut(), new Promise(r => setTimeout(r, 3000))]); } catch(e) {}
    setAdminMode(false);
  }

  function setAdminMode(admin) {
    isAdmin = admin;
    document.getElementById('menu-login-btn').classList.toggle('hidden', admin);
    document.getElementById('menu-logout-btn').classList.toggle('hidden', !admin);
    document.getElementById('menu-admin-link-btn').classList.toggle('hidden', !admin);
    document.getElementById('add-event-btn').classList.toggle('hidden', !admin);
    document.getElementById('detail-edit-btn').classList.toggle('hidden', !admin);
    document.getElementById('detail-delete-btn').classList.toggle('hidden', !admin);
    renderCalendar();
  }

  // ─── データ取得 ──────────────────────────────────────────────────────
  async function loadEvents() {
    if (!supabaseClient) return;
    try {
      const { data, error } = await supabaseClient
        .from(TABLE_EVENTS).select('*').order('event_date', { ascending: true });
      if (!error && data) events = data;
    } catch(e) {}
    renderCalendar();
    renderLegend();
  }

  // ─── 凡例 ────────────────────────────────────────────────────────────
  function renderLegend() {
    const cats = [...new Set(events.map(e => e.category).filter(Boolean))].sort();
    const el = document.getElementById('cat-legend');
    el.innerHTML = cats.map(cat =>
      `<span class="flex items-center gap-1 text-xs font-bold text-gray-700 bg-white px-2 py-1 rounded-full shadow-sm border border-gray-200">
        <span class="w-2.5 h-2.5 rounded-full inline-block" style="background:${catColor(cat)}"></span>${cat}
      </span>`
    ).join('');
  }

  // ─── ビュー切り替え ──────────────────────────────────────────────────
  function setView(mode) {
    viewMode = mode;
    document.getElementById('view-month').classList.toggle('hidden', mode !== 'month');
    document.getElementById('view-list').classList.toggle('hidden', mode !== 'list');
    document.getElementById('btn-month').className = `px-3 py-2 rounded-xl text-sm font-bold transition-colors ${mode === 'month' ? 'bg-red-500 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`;
    document.getElementById('btn-list').className  = `px-3 py-2 rounded-xl text-sm font-bold transition-colors ${mode === 'list'  ? 'bg-red-500 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`;
    renderCalendar();
  }

  function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
    renderCalendar();
  }
  function goToToday() {
    const now = new Date();
    currentYear = now.getFullYear(); currentMonth = now.getMonth();
    renderCalendar();
  }

  // ─── カレンダー描画 ──────────────────────────────────────────────────
  function renderCalendar() {
    document.getElementById('month-label').textContent = `${currentYear}年${currentMonth + 1}月`;
    if (viewMode === 'month') renderMonthView();
    else renderListView();
  }

  function renderMonthView() {
    const body = document.getElementById('cal-body');
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const today = new Date().toISOString().slice(0, 10);

    const evMap = {};
    events.forEach(ev => {
      if (!evMap[ev.event_date]) evMap[ev.event_date] = [];
      evMap[ev.event_date].push(ev);
    });

    let html = '';
    for (let i = 0; i < firstDay; i++) {
      html += `<div class="cal-day border-r border-b border-gray-100 bg-gray-50/50 p-1"></div>`;
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dow = (firstDay + d - 1) % 7;
      const isToday = dateStr === today;
      const dayEvs = evMap[dateStr] || [];
      const isLastCol = dow === 6;
      const textColor = dow === 0 ? 'text-red-500' : dow === 6 ? 'text-blue-500' : 'text-gray-700';
      const bgClass = isToday ? 'bg-red-50' : '';

      html += `<div class="cal-day border-r border-b border-gray-100 p-1 ${bgClass}${isLastCol ? ' border-r-0' : ''}">
        <div class="flex items-center justify-between mb-0.5">
          <span class="${isToday ? 'bg-red-500 text-white w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-black' : `text-xs font-bold ${textColor}`}">${d}</span>
        </div>
        ${dayEvs.map(ev =>
          `<span class="event-pill" style="background:${catColor(ev.category)}"
            onclick="openDetail('${ev.id}')" title="${escHtml(ev.title)}">
            ${escHtml(ev.title)}
          </span>`
        ).join('')}
      </div>`;
    }
    body.innerHTML = html;
  }

  function renderListView() {
    const body = document.getElementById('list-body');
    const today = new Date().toISOString().slice(0, 10);
    const ym = `${currentYear}-${String(currentMonth + 1).padStart(2,'0')}`;
    const monthEvs = events.filter(ev => ev.event_date && ev.event_date.startsWith(ym));

    if (monthEvs.length === 0) {
      body.innerHTML = '<div class="text-center text-gray-400 text-sm py-12 bg-white rounded-2xl shadow border border-gray-200">この月のイベントはありません</div>';
      return;
    }

    body.innerHTML = monthEvs.map(ev => {
      const d = new Date(ev.event_date + 'T00:00:00');
      const dateLabel = d.toLocaleDateString('ja-JP', { month:'long', day:'numeric', weekday:'short' });
      const isPast = ev.event_date < today;
      const color = catColor(ev.category);
      return `<div class="bg-white rounded-2xl shadow border border-gray-100 overflow-hidden flex ${isPast ? 'opacity-60' : ''}" onclick="openDetail('${ev.id}')" style="cursor:pointer">
        <div class="w-1.5 shrink-0" style="background:${color}"></div>
        <div class="p-4 flex-1 min-w-0">
          <div class="flex items-start justify-between gap-2">
            <div class="min-w-0">
              ${ev.category ? `<span class="inline-block text-xs font-bold text-white px-2 py-0.5 rounded-full mb-1" style="background:${color}">${ev.category}</span>` : ''}
              <p class="font-black text-gray-800 leading-snug">${escHtml(ev.title)}</p>
            </div>
            <span class="text-xs text-gray-400 shrink-0 mt-0.5">${dateLabel}</span>
          </div>
          <div class="text-xs text-gray-500 mt-1 space-y-0.5">
            ${ev.event_time ? `<p>🕐 ${escHtml(ev.event_time)}</p>` : ''}
            ${ev.location   ? `<p>📍 ${escHtml(ev.location)}</p>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // ─── イベント詳細 ────────────────────────────────────────────────────
  function openDetail(id) {
    const ev = events.find(e => e.id === id);
    if (!ev) return;
    currentDetailEvent = ev;
    const color = catColor(ev.category);
    document.getElementById('detail-header').style.background = `linear-gradient(to right, ${color}cc, ${color})`;
    document.getElementById('detail-cat').textContent = ev.category || '';
    document.getElementById('detail-title').textContent = ev.title;

    const d = new Date(ev.event_date + 'T00:00:00');
    const dateLabel = d.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
    let infoHtml = `<p>📆 ${dateLabel}</p>`;
    if (ev.event_time) infoHtml += `<p>🕐 ${escHtml(ev.event_time)}</p>`;
    if (ev.location)   infoHtml += `<p>📍 ${escHtml(ev.location)}</p>`;
    if (ev.transport)  infoHtml += `<p>🚗 移動：${escHtml(ev.transport)}</p>`;
    document.getElementById('detail-info').innerHTML = infoHtml;

    const memoEl = document.getElementById('detail-memo');
    if (ev.memo) { memoEl.textContent = '📝 ' + ev.memo; memoEl.classList.remove('hidden'); }
    else memoEl.classList.add('hidden');

    document.getElementById('detail-edit-btn').classList.toggle('hidden', !isAdmin);
    document.getElementById('detail-delete-btn').classList.toggle('hidden', !isAdmin);
    document.getElementById('detail-modal').classList.remove('hidden');
  }
  function closeDetailModal() {
    document.getElementById('detail-modal').classList.add('hidden');
    currentDetailEvent = null;
  }
  function editCurrentEvent() {
    if (!currentDetailEvent) return;
    closeDetailModal();
    openEventModal(currentDetailEvent.id);
  }
  async function deleteCurrentEvent() {
    const ev = currentDetailEvent;
    if (!ev) return;
    if (!confirm(`「${ev.title}」を削除しますか？`)) return;
    try {
      await supabaseClient.from(TABLE_EVENTS).delete().eq('id', ev.id);
      closeDetailModal();
      await loadEvents();
    } catch(e) { alert('削除に失敗しました'); }
  }

  // ─── .ics ダウンロード ───────────────────────────────────────────────
  function downloadICS() {
    const ev = currentDetailEvent;
    if (!ev) return;
    const dt = ev.event_date.replace(/-/g, '');
    const dtNext = (() => {
      const d = new Date(ev.event_date + 'T00:00:00');
      d.setDate(d.getDate() + 1);
      return d.toISOString().slice(0, 10).replace(/-/g, '');
    })();
    const desc = [ev.event_time, ev.transport, ev.memo].filter(Boolean).join('\\n');
    const ics = [
      'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//SoccerCalendar//JA',
      'BEGIN:VEVENT',
      `UID:${ev.id}@soccer-calendar`,
      `DTSTART;VALUE=DATE:${dt}`,
      `DTEND;VALUE=DATE:${dtNext}`,
      `SUMMARY:${ev.title}`,
      ev.location ? `LOCATION:${ev.location}` : '',
      desc        ? `DESCRIPTION:${desc}` : '',
      'END:VEVENT', 'END:VCALENDAR'
    ].filter(l => l !== '').join('\r\n');
    const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${ev.title}.ics`; a.click();
    URL.revokeObjectURL(url);
  }

  // ─── イベント作成／編集 ──────────────────────────────────────────────
  function openEventModal(id = null) {
    document.getElementById('event-modal-title').textContent = id ? '📅 イベントを編集' : '📅 イベントを追加';
    document.getElementById('edit-event-id').value = id || '';
    const fields = ['ev-title','ev-time','ev-location','ev-transport','ev-memo'];
    if (id) {
      const ev = events.find(e => e.id === id);
      if (ev) {
        document.getElementById('ev-title').value     = ev.title || '';
        document.getElementById('ev-date').value      = ev.event_date || '';
        document.getElementById('ev-time').value      = ev.event_time || '';
        document.getElementById('ev-category').value  = ev.category || '';
        document.getElementById('ev-location').value  = ev.location || '';
        document.getElementById('ev-transport').value = ev.transport || '';
        document.getElementById('ev-memo').value      = ev.memo || '';
      }
    } else {
      fields.forEach(fid => { document.getElementById(fid).value = ''; });
      document.getElementById('ev-date').value     = '';
      document.getElementById('ev-category').value = '';
    }
    document.getElementById('event-modal-status').classList.add('hidden');
    document.getElementById('event-modal').classList.remove('hidden');
  }
  function closeEventModal() {
    document.getElementById('event-modal').classList.add('hidden');
  }

  async function saveEvent() {
    const btn    = document.getElementById('event-save-btn');
    const txt    = document.getElementById('event-save-text');
    const load   = document.getElementById('event-save-loading');
    const status = document.getElementById('event-modal-status');
    const editId = document.getElementById('edit-event-id').value;
    const title  = document.getElementById('ev-title').value.trim();
    const date   = document.getElementById('ev-date').value;
    if (!title) { showStatus(status, 'タイトルを入力してください', 'error'); return; }
    if (!date)  { showStatus(status, '日付を入力してください', 'error'); return; }

    btn.disabled = true; txt.classList.add('hidden'); load.classList.remove('hidden');
    try {
      const payload = {
        title, event_date: date,
        event_time: document.getElementById('ev-time').value.trim()      || null,
        category:   document.getElementById('ev-category').value          || null,
        location:   document.getElementById('ev-location').value.trim()   || null,
        transport:  document.getElementById('ev-transport').value.trim()  || null,
        memo:       document.getElementById('ev-memo').value.trim()       || null,
      };
      const { error } = editId
        ? await supabaseClient.from(TABLE_EVENTS).update(payload).eq('id', editId)
        : await supabaseClient.from(TABLE_EVENTS).insert(payload);
      if (error) { showStatus(status, '保存に失敗しました: ' + error.message, 'error'); return; }
      closeEventModal();
      loadEvents();
    } catch(e) {
      showStatus(status, 'エラーが発生しました', 'error');
    } finally {
      btn.disabled = false; txt.classList.remove('hidden'); load.classList.add('hidden');
    }
  }

  // ─── 接続設定 ────────────────────────────────────────────────────────
  function openSetupModal() {
    document.getElementById('settings-menu')?.classList.add('hidden');
    const cfg = loadConfig();
    document.getElementById('setup-team').value = cfg?.team_name || '';
    document.getElementById('setup-url').value  = cfg?.supabase_url || '';
    document.getElementById('setup-key').value  = cfg?.supabase_anon_key || '';
    const color = cfg?.primary_color || '#c0392b';
    document.getElementById('setup-primary-color').value = color;
    calSetColorPreview(color);
    document.getElementById('setup-status').classList.add('hidden');
    document.getElementById('setup-modal').classList.remove('hidden');
  }
  function closeSetupModal() {
    document.getElementById('setup-modal').classList.add('hidden');
  }
  function calSetColorPreview(hex) {
    document.getElementById('cal-color-swatch').style.background = hex;
    document.getElementById('cal-color-hex').textContent = hex.toUpperCase();
    document.getElementById('setup-primary-color').value = hex;
  }
  function calSetPresetColor(hex) {
    calSetColorPreview(hex);
  }

  async function saveSetup() {
    const url    = document.getElementById('setup-url').value.trim();
    const key    = document.getElementById('setup-key').value.trim();
    const team   = document.getElementById('setup-team').value.trim();
    const color  = document.getElementById('setup-primary-color').value || '#c0392b';
    const status = document.getElementById('setup-status');
    if (!url || !key) { showStatus(status, 'URLとKeyを入力してください', 'error'); return; }

    const cfg = { supabase_url: url, supabase_anon_key: key, team_name: team, primary_color: color };
    saveConfig(cfg);
    showStatus(status, '✅ 保存しました。再読み込みします…', 'success');
    setTimeout(() => location.reload(), 800);
  }

  // ─── 管理者リンク発行 ────────────────────────────────────────────────
  function openAdminLinkModal() {
    document.getElementById('settings-menu')?.classList.add('hidden');
    const base = getBaseUrl();
    document.getElementById('admin-link-base-url').value = base;
    document.getElementById('admin-link-output').classList.add('hidden');
    document.getElementById('admin-link-copy-msg').classList.add('hidden');
    document.getElementById('admin-link-modal').classList.remove('hidden');
    if (base) updateAdminLink();
  }
  function closeAdminLinkModal() {
    document.getElementById('admin-link-modal').classList.add('hidden');
  }
  function updateAdminLink() {
    const base = document.getElementById('admin-link-base-url').value.trim();
    if (!base) { document.getElementById('admin-link-output').classList.add('hidden'); return; }
    const cfg = loadConfig();
    if (!cfg?.supabase_url) return;
    const hash = buildHashString(cfg);
    const link = base + '#' + hash;
    document.getElementById('admin-link-text').textContent = link;
    document.getElementById('admin-link-output').classList.remove('hidden');
  }
  function copyAdminLink() {
    const text = document.getElementById('admin-link-text').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const msg = document.getElementById('admin-link-copy-msg');
      msg.classList.remove('hidden');
      setTimeout(() => msg.classList.add('hidden'), 2000);
    }).catch(() => {});
  }

  // ─── ユーティリティ ──────────────────────────────────────────────────
  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function showStatus(el, msg, type) {
    if (!el) return;
    el.textContent = msg;
    el.className = `text-sm font-medium ${type === 'error' ? 'text-red-600' : 'text-green-600'}`;
    el.classList.remove('hidden');
  }

  // ─── Enterキー：ログイン ─────────────────────────────────────────────
  document.addEventListener('keypress', e => {
    if (e.key === 'Enter' && !document.getElementById('login-modal').classList.contains('hidden')) {
      handleLogin();
    }
  });

  // ─── 起動 ────────────────────────────────────────────────────────────
  (async () => {
    try {
      // ハッシュ設定（管理者リンク経由）
      if (location.hash) {
        try {
          const d = parseHashConfig();
          if (d?.u && d?.k) {
            const existing = loadConfig() || {};
            saveConfig({ ...existing, supabase_url: d.u, supabase_anon_key: d.k, team_name: d.t || existing.team_name || '', primary_color: d.c || existing.primary_color || '#c0392b' });
            history.replaceState(null, '', location.pathname + location.search);
          }
        } catch(e) {}
      }

      if (!initSupabase()) {
        document.getElementById('loading-screen').classList.add('hidden');
        openSetupModal();
        return;
      }

      // ログイン状態確認
      let session = null;
      try {
        const result = await Promise.race([
          supabaseClient.auth.getSession(),
          new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 10000))
        ]);
        session = result?.data?.session ?? null;
      } catch(e) {}

      setAdminMode(!!session);
      await loadEvents();
    } catch(e) {
      console.error('起動エラー:', e);
    } finally {
      document.getElementById('loading-screen').classList.add('hidden');
    }
  })();
</script>

</body>
</html>
