<!doctype html>
<html lang="ja" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>出欠確認システム</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:      #c0392b;
      --primary-dark: #922b21;
      --primary-mid:  #a93226;
      --primary-light:#e74c3c;
    }
    * { font-family: 'Noto Sans JP', sans-serif; }
    body { box-sizing: border-box; }

    .bg-primary       { background-color: var(--primary) !important; }
    .bg-primary-dark  { background-color: var(--primary-dark) !important; }
    .bg-red-500, .hover\:bg-red-500:hover   { background-color: var(--primary)      !important; }
    .bg-red-600, .hover\:bg-red-600:hover   { background-color: var(--primary-mid)  !important; }
    .bg-red-700, .hover\:bg-red-700:hover   { background-color: var(--primary-dark) !important; }
    .from-red-700 { --tw-gradient-from: var(--primary-dark) !important; }
    .from-red-600 { --tw-gradient-from: var(--primary-mid)  !important; }
    .to-red-500   { --tw-gradient-to:   var(--primary)      !important; }
    .to-red-600   { --tw-gradient-to:   var(--primary-mid)  !important; }
    .text-red-600 { color: var(--primary-mid) !important; }
    .text-red-500 { color: var(--primary)     !important; }
    .focus\:ring-red-500:focus { --tw-ring-color: var(--primary) !important; }
    .border-red-500 { border-color: var(--primary) !important; }

    /* ラジオボタン */
    .radio-btn {
      width: 100%; padding: 0.75rem 0.5rem; border-radius: 0.75rem;
      border: 2px solid #e5e7eb; background: #fff; color: #4b5563;
      font-weight: 700; font-size: 0.875rem; cursor: pointer;
      transition: all 0.15s; text-align: center; display: block;
    }
    .radio-btn:hover { border-color: #d1d5db; background: #f9fafb; }
    .radio-btn[data-selected="1"][data-color="green"]  { border-color:#22c55e; background:#f0fdf4; color:#15803d; }
    .radio-btn[data-selected="1"][data-color="red"]    { border-color:#ef4444; background:#fef2f2; color:#dc2626; }
    .radio-btn[data-selected="1"][data-color="blue"]   { border-color:#3b82f6; background:#eff6ff; color:#1d4ed8; }
    .radio-btn[data-selected="1"][data-color="amber"]  { border-color:#f59e0b; background:#fffbeb; color:#b45309; }
    .radio-btn[data-selected="1"][data-color="gray"]   { border-color:#6b7280; background:#f9fafb; color:#374151; }
    .radio-btn[data-selected="1"][data-color="purple"] { border-color:#8b5cf6; background:#f5f3ff; color:#6d28d9; }

    /* 回答テーブル */
    .resp-table th { background: #f9fafb; font-size:0.75rem; font-weight:700; color:#6b7280; padding:8px 10px; text-align:center; border-bottom:2px solid #e5e7eb; white-space:nowrap; }
    .resp-table td { font-size:0.8rem; padding:8px 10px; text-align:center; border-bottom:1px solid #f3f4f6; vertical-align:middle; }
    .resp-table tr:last-child td { border-bottom:none; }
    .resp-table tr:hover td { background:#f9fafb; }
    .badge { display:inline-block; font-size:0.7rem; font-weight:700; padding:2px 8px; border-radius:999px; white-space:nowrap; }
  </style>
</head>
<body class="h-full bg-gray-50">
<div id="app" class="min-h-full">

  <!-- ローディング -->
  <div id="loading-screen" class="fixed inset-0 bg-white flex items-center justify-center z-50">
    <div class="text-center space-y-3">
      <div class="text-5xl">📋</div>
      <p class="text-gray-400 text-sm font-medium">読み込み中...</p>
    </div>
  </div>

  <!-- ヘッダー -->
  <header class="p-4">
    <div class="max-w-[750px] mx-auto bg-gradient-to-r from-red-700 to-red-600 text-white p-5 shadow-lg rounded-2xl">
      <div class="flex items-center gap-3">
        <span class="text-3xl">📋</span>
        <div class="flex-1 min-w-0">
          <h1 id="app-team-name" class="text-xl font-black leading-tight truncate">出欠確認システム</h1>
          <p class="text-xs text-white/80 tracking-widest mt-0.5">ATTENDANCE SYSTEM</p>
        </div>
        <button id="settings-btn" type="button" class="bg-white/15 hover:bg-white/25 text-white text-lg rounded-lg px-3 py-2 transition-colors shrink-0">⚙️</button>
      </div>
    </div>
  </header>

  <!-- 管理者ビュー -->
  <main id="admin-view" class="hidden max-w-[750px] mx-auto px-4 pb-8 space-y-3">
    <div class="flex items-center justify-between py-2">
      <h2 class="text-base font-black text-gray-700">⚽ イベント一覧</h2>
      <button id="create-event-btn" type="button"
        class="bg-red-500 hover:bg-red-600 text-white font-bold px-4 py-2 rounded-xl text-sm transition-colors">
        ＋ 新規作成
      </button>
    </div>
    <div id="event-list"></div>
  </main>

  <!-- 保護者イベント一覧ビュー -->
  <main id="parent-list-view" class="hidden max-w-[750px] mx-auto px-4 pb-8 space-y-3">
    <div class="py-2">
      <h2 class="text-base font-black text-gray-700">⚽ イベント一覧</h2>
      <p class="text-xs text-gray-400 mt-0.5">参加するイベントをタップして回答してください</p>
    </div>
    <div id="parent-event-list"></div>
  </main>

  <!-- 回答ビュー（保護者） -->
  <main id="respond-view" class="hidden max-w-[750px] mx-auto px-4 pb-8 space-y-4">
    <button id="back-to-list-btn" class="hidden text-sm text-gray-500 hover:text-gray-700 font-medium flex items-center gap-1 py-1">
      ← イベント一覧に戻る
    </button>
    <div id="event-info-card" class="hidden bg-white rounded-2xl shadow p-5"></div>
    <div id="form-container"></div>
  </main>

</div><!-- /app -->

<!-- ══ 接続設定モーダル ══════════════════════════════════════════════ -->
<div id="setup-modal" class="fixed inset-0 z-[100] hidden">
  <div class="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
  <div class="absolute inset-4 md:inset-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-lg bg-white rounded-2xl shadow-2xl overflow-auto max-h-full">
    <div class="bg-gradient-to-r from-red-700 to-red-600 text-white px-6 py-5 rounded-t-2xl">
      <h2 class="text-xl font-black">⚙️ 接続設定</h2>
      <p class="text-sm text-white/80 mt-1">Supabaseの接続情報を入力してください</p>
    </div>
    <div class="p-6 space-y-4">
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-1">チーム名 <span class="text-red-500">*</span></label>
        <input type="text" id="setup-team-name" placeholder="○○サッカースクール"
          class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-red-500">
      </div>
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-1">Supabase URL <span class="text-red-500">*</span></label>
        <input type="url" id="setup-url" placeholder="https://xxxxxxxxxx.supabase.co"
          class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-3 text-gray-800 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-red-500" spellcheck="false">
      </div>
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-1">anon public キー <span class="text-red-500">*</span></label>
        <input type="text" id="setup-anon-key" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
          class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-3 text-gray-800 font-mono text-xs focus:outline-none focus:ring-2 focus:ring-red-500" spellcheck="false">
      </div>
      <div id="setup-status" class="hidden text-sm rounded-lg px-4 py-3 font-medium"></div>
      <button id="setup-save-btn" type="button"
        class="w-full bg-red-500 hover:bg-red-600 text-white font-black py-3 rounded-xl transition-colors">
        <span id="setup-save-text">接続テスト＆保存</span>
        <span id="setup-save-loading" class="hidden">接続テスト中...</span>
      </button>
      <p class="text-xs text-gray-400 text-center">MRSアプリと同じSupabaseプロジェクトを使う場合、<br>同じURL・キーを入力してください</p>
    </div>
  </div>
</div>

<!-- ══ イベント作成／編集モーダル ══════════════════════════════════════ -->
<div id="create-event-modal" class="fixed inset-0 z-[100] hidden">
  <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeCreateEventModal()"></div>
  <div class="absolute inset-4 md:inset-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-lg bg-white rounded-2xl shadow-2xl overflow-auto max-h-full">
    <div class="bg-gradient-to-r from-red-700 to-red-600 text-white px-6 py-5 rounded-t-2xl flex items-center justify-between">
      <h2 id="create-modal-title" class="text-xl font-black">⚽ イベントを作成</h2>
      <button onclick="closeCreateEventModal()" class="text-white/70 hover:text-white text-2xl leading-none">×</button>
    </div>
    <div class="p-6 space-y-4">
      <input type="hidden" id="edit-event-id">
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-1">タイトル <span class="text-red-500">*</span></label>
        <input type="text" id="ev-title" placeholder="例：U11 5.10 試合"
          class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-red-500">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-gray-700 text-sm font-bold mb-1">日付 <span class="text-red-500">*</span></label>
          <input type="date" id="ev-date"
            class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>
        <div>
          <label class="block text-gray-700 text-sm font-bold mb-1">時間</label>
          <input type="text" id="ev-time" placeholder="例：AM / 13:00〜"
            class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>
        <div>
          <label class="block text-gray-700 text-sm font-bold mb-1">カテゴリ</label>
          <select id="ev-category"
            class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-red-500">
            <option value="">未設定</option>
            <option value="U7">U7</option>
            <option value="U8">U8</option>
            <option value="U9">U9</option>
            <option value="U10">U10</option>
            <option value="U11">U11</option>
            <option value="U12">U12</option>
          </select>
        </div>
        <div>
          <label class="block text-gray-700 text-sm font-bold mb-1">移動手段</label>
          <input type="text" id="ev-transport" placeholder="例：車"
            class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>
      </div>
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-1">場所</label>
        <input type="text" id="ev-location" placeholder="例：伊丹市立桜台小学校"
          class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-red-500">
      </div>
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-1">メモ（保護者へのお知らせ）</label>
        <textarea id="ev-memo" rows="2" placeholder="任意"
          class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-red-500 resize-none"></textarea>
      </div>
      <div id="create-event-status" class="hidden text-sm rounded-lg px-4 py-3 font-medium"></div>
      <button id="save-event-btn" type="button"
        class="w-full bg-red-500 hover:bg-red-600 text-white font-black py-3 rounded-xl transition-colors">
        <span id="save-event-text">保存する</span>
        <span id="save-event-loading" class="hidden">保存中...</span>
      </button>
    </div>
  </div>
</div>

<!-- ══ イベント詳細モーダル ══════════════════════════════════════════ -->
<div id="detail-modal" class="fixed inset-0 z-[100] hidden">
  <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeDetailModal()"></div>
  <div class="absolute inset-4 md:inset-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-2xl bg-white rounded-2xl shadow-2xl overflow-auto max-h-full">
    <div class="bg-gradient-to-r from-red-700 to-red-600 text-white px-6 py-5 rounded-t-2xl flex items-center justify-between">
      <div class="min-w-0">
        <h2 id="detail-title" class="text-xl font-black truncate leading-tight"></h2>
        <p id="detail-subtitle" class="text-sm text-white/80 mt-1"></p>
      </div>
      <button onclick="closeDetailModal()" class="text-white/70 hover:text-white text-2xl leading-none shrink-0 ml-3">×</button>
    </div>
    <!-- 集計 -->
    <div class="px-4 py-4 bg-gray-50 border-b border-gray-200">
      <div class="grid grid-cols-4 gap-2 text-center">
        <div class="bg-white rounded-xl p-3 shadow-sm">
          <p class="text-xs text-gray-400 mb-1">回答数</p>
          <p id="summary-total" class="text-2xl font-black text-gray-700">0</p>
        </div>
        <div class="bg-green-50 rounded-xl p-3">
          <p class="text-xs text-gray-400 mb-1">出席</p>
          <p id="summary-attend" class="text-2xl font-black text-green-600">0</p>
        </div>
        <div class="bg-blue-50 rounded-xl p-3">
          <p class="text-xs text-gray-400 mb-1">乗せて欲しい</p>
          <p id="summary-need-ride" class="text-2xl font-black text-blue-600">0</p>
        </div>
        <div class="bg-amber-50 rounded-xl p-3">
          <p class="text-xs text-gray-400 mb-1">配車できる</p>
          <p id="summary-can-drive" class="text-2xl font-black text-amber-600">0</p>
        </div>
      </div>
    </div>
    <!-- 回答一覧（テーブル） -->
    <div class="p-4 overflow-x-auto">
      <div id="response-list"></div>
      <p id="no-responses" class="hidden text-center text-gray-400 text-sm py-8">まだ回答がありません</p>
    </div>
  </div>
</div>

<script>
  // ─── 定数・設定 ──────────────────────────────────────────────────────────
  const STORAGE_CONFIG_KEY = 'mrs_app_config_v1';
  const STORAGE_TEAMS_KEY  = 'mrs_teams_v1';
  const STORAGE_ACTIVE_KEY = 'mrs_active_team_v1';
  const TABLE_EVENTS    = 'attendance_events';
  const TABLE_RESPONSES = 'attendance_responses';
  const TABLE_PLAYERS   = 'app_records';  // MRSと共通

  let SUPABASE_CONFIG = { url: '', anonKey: '' };
  let supabaseClient  = null;
  let events = [];
  let playersMap = {};   // { '10': '山田太郎', ... }
  let currentEventId = null;
  let parentHashConfig = null;  // 保護者モード用config

  const params = new URLSearchParams(location.search);
  const respondEventId = params.get('respond');
  const isRespondMode  = !!respondEventId;
  const isParentMode   = params.get('view') === 'parent';

  // ─── Config ──────────────────────────────────────────────────────────────
  function loadConfig() {
    try {
      const teams = JSON.parse(localStorage.getItem(STORAGE_TEAMS_KEY) || '[]');
      const activeId = localStorage.getItem(STORAGE_ACTIVE_KEY);
      const active = teams.find(t => t.id === activeId) || teams[0];
      if (active?.supabase_url) {
        return { supabase_url: active.supabase_url, supabase_anon_key: active.supabase_anon_key, team_name: active.team_name, primary_color: active.primary_color };
      }
      const raw = localStorage.getItem(STORAGE_CONFIG_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  }

  function saveConfig(cfg) {
    try { localStorage.setItem(STORAGE_CONFIG_KEY, JSON.stringify(cfg)); } catch(e) {}
  }

  function applyConfig(cfg) {
    if (!cfg) return;
    if (cfg.team_name) document.getElementById('app-team-name').textContent = cfg.team_name + ' 出欠確認';
    if (cfg.primary_color) applyColor(cfg.primary_color);
    if (cfg.supabase_url)      SUPABASE_CONFIG.url     = cfg.supabase_url;
    if (cfg.supabase_anon_key) SUPABASE_CONFIG.anonKey = cfg.supabase_anon_key;
  }

  function applyColor(hex) {
    if (!hex || !/^#[0-9a-fA-F]{6}$/.test(hex)) return;
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    const dark = `rgb(${Math.round(r*.75)},${Math.round(g*.75)},${Math.round(b*.75)})`;
    const mid  = `rgb(${Math.round(r*.88)},${Math.round(g*.88)},${Math.round(b*.88)})`;
    const root = document.documentElement;
    root.style.setProperty('--primary', hex);
    root.style.setProperty('--primary-dark', dark);
    root.style.setProperty('--primary-mid', mid);
  }

  function parseHashConfig() {
    const hash = location.hash.slice(1);
    if (!hash) return null;
    try {
      return JSON.parse(decodeURIComponent(escape(atob(hash))));
    } catch(e) { return null; }
  }

  function buildHashString(cfg) {
    const payload = { u: cfg.supabase_url, k: cfg.supabase_anon_key, t: cfg.team_name || '', c: cfg.primary_color || '#c0392b' };
    return btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  }

  function getBaseUrl() {
    return (location.protocol === 'file:' || location.origin === 'null')
      ? '' : location.origin + location.pathname;
  }

  // ─── Supabase ─────────────────────────────────────────────────────────────
  function initSupabase() {
    if (!SUPABASE_CONFIG.url || !SUPABASE_CONFIG.anonKey) return false;
    supabaseClient = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
    return true;
  }

  // ─── 選手名マップ ─────────────────────────────────────────────────────────
  async function loadPlayersMap() {
    if (!supabaseClient) return;
    try {
      const { data } = await supabaseClient
        .from(TABLE_PLAYERS)
        .select('payload')
        .eq('type', 'player');
      if (data) {
        playersMap = {};
        data.forEach(row => {
          const p = row.payload || {};
          if (p.number) playersMap[String(p.number).trim()] = p.name || '';
        });
      }
    } catch(e) { console.warn('選手データ取得失敗:', e); }
  }

  function getPlayerName(jerseyNumber) {
    return playersMap[String(jerseyNumber).trim()] || '';
  }

  // ─── 管理者：イベント一覧 ─────────────────────────────────────────────────
  async function loadEvents() {
    const { data, error } = await supabaseClient
      .from(TABLE_EVENTS)
      .select(`*, ${TABLE_RESPONSES}(count)`)
      .order('event_date', { ascending: false });
    if (error) { console.error('loadEvents:', error); return; }
    events = data || [];
    renderEvents();
  }

  function renderEvents() {
    const el = document.getElementById('event-list');
    if (events.length === 0) {
      el.innerHTML = '<div class="text-center text-gray-400 text-sm py-12 bg-white rounded-2xl shadow">イベントがありません<br><span class="text-xs mt-1 block">「新規作成」からイベントを追加してください</span></div>';
      return;
    }
    el.innerHTML = `<div class="space-y-3">${events.map(ev => {
      const count   = ev[TABLE_RESPONSES]?.[0]?.count ?? 0;
      const dateStr = formatDate(ev.event_date);
      return `<div class="bg-white rounded-2xl shadow p-4" data-event-id="${ev.id}">
        <div class="mb-3">
          <p class="font-black text-gray-800 mb-1.5">
            ${ev.category ? `<span class="text-xs font-bold bg-red-100 text-red-700 px-2 py-0.5 rounded-full mr-1">${escHtml(ev.category)}</span>` : ''}${escHtml(ev.title)}
          </p>
          <div class="text-sm text-gray-500 space-y-0.5">
            ${dateStr ? `<p>📆 ${escHtml(dateStr)}</p>` : ''}
            ${ev.event_time ? `<p>🕐 ${escHtml(ev.event_time)}</p>` : ''}
            ${ev.location ? `<p>📍 ${escHtml(ev.location)}</p>` : ''}
            ${ev.transport ? `<p>🚗 移動：${escHtml(ev.transport)}</p>` : ''}
          </div>
          ${ev.memo ? `<div class="mt-2 bg-amber-50 rounded-xl px-3 py-2 text-amber-700 text-xs">📝 ${escHtml(ev.memo)}</div>` : ''}
        </div>
        <div class="grid grid-cols-2 gap-2 mt-1">
          <button onclick="copyEventShareLink('${ev.id}')"
            class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-xl text-xs transition-colors">
            🔗 リンクをコピー
          </button>
          <button onclick="openDetail('${ev.id}')"
            class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 rounded-xl text-xs transition-colors">
            📊 回答を確認（${count}件）
          </button>
          <button onclick="openCreateEventModal('${ev.id}')"
            class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2 rounded-xl text-xs transition-colors">
            ✏️ 編集
          </button>
          <button onclick="deleteEventById('${ev.id}')"
            class="bg-red-50 hover:bg-red-100 text-red-600 font-bold py-2 rounded-xl text-xs transition-colors">
            🗑️ 削除
          </button>
        </div>
      </div>`;

  async function saveEvent() {
    const btn      = document.getElementById('save-event-btn');
    const txt      = document.getElementById('save-event-text');
    const load     = document.getElementById('save-event-loading');
    const statusEl = document.getElementById('create-event-status');
    const editId   = document.getElementById('edit-event-id').value;

    const title = document.getElementById('ev-title').value.trim();
    const date  = document.getElementById('ev-date').value;
    if (!title) { setStatus(statusEl, 'タイトルを入力してください', 'error'); return; }
    if (!date)  { setStatus(statusEl, '日付を入力してください', 'error'); return; }

    btn.disabled = true; txt.classList.add('hidden'); load.classList.remove('hidden');

    const payload = {
      title,
      event_date: date,
      event_time: document.getElementById('ev-time').value.trim()      || null,
      category:   document.getElementById('ev-category').value          || null,
      transport:  document.getElementById('ev-transport').value.trim()  || null,
      location:   document.getElementById('ev-location').value.trim()   || null,
      memo:       document.getElementById('ev-memo').value.trim()       || null,
    };

    const { error } = editId
      ? await supabaseClient.from(TABLE_EVENTS).update(payload).eq('id', editId)
      : await supabaseClient.from(TABLE_EVENTS).insert(payload);

    btn.disabled = false; txt.classList.remove('hidden'); load.classList.add('hidden');

    if (error) { setStatus(statusEl, '保存に失敗しました: ' + error.message, 'error'); return; }
    closeCreateEventModal();
    await loadEvents();
  }

  function radios(name, opts) {
    return opts.map(o =>
      `<button type="button" class="radio-btn" data-name="${name}" data-value="${o.v}" data-color="${o.c}" data-selected="0">
        ${o.i}<br>${o.v}
      </button>`
    ).join('');
  }

  function getRadioValue(name) {
    return document.querySelector(`.radio-btn[data-name="${name}"][data-selected="1"]`)?.dataset.value || null;
  }

  async function submitResponse(eventId) {
    const btn      = document.getElementById('submit-btn');
    const statusEl = document.getElementById('form-status');

    const jersey    = document.getElementById('f-jersey').value.trim();
    const attend    = getRadioValue('f-attend');
    const transport = getRadioValue('f-transport');
    const carpool   = getRadioValue('f-carpool');

    if (!jersey)    { setStatus(statusEl, '背番号を入力してください', 'error'); return; }
    if (!attend)    { setStatus(statusEl, '出欠確認を選択してください', 'error'); return; }
    if (!transport) { setStatus(statusEl, '送迎について選択してください', 'error'); return; }
    if (!carpool)   { setStatus(statusEl, '配車について選択してください', 'error'); return; }

    btn.disabled = true;
    document.getElementById('submit-text').classList.add('hidden');
    document.getElementById('submit-loading').classList.remove('hidden');

    const { error } = await supabaseClient
      .from(TABLE_RESPONSES)
      .upsert({
        event_id:       eventId,
        jersey_number:  jersey,
        attendance:     attend,
        transport_need: transport,
        carpool,
        notes: document.getElementById('f-notes').value.trim() || null,
      }, { onConflict: 'event_id,jersey_number' });

    btn.disabled = false;
    document.getElementById('submit-text').classList.remove('hidden');
    document.getElementById('submit-loading').classList.add('hidden');

    if (error) {
      setStatus(statusEl, '送信に失敗しました。もう一度お試しください。', 'error');
      console.error(error);
      return;
    }

    // 完了画面
    const name = getPlayerName(jersey);
    document.getElementById('form-container').innerHTML = `
      <div class="bg-white rounded-2xl shadow p-10 text-center space-y-4">
        <div class="text-6xl">✅</div>
        <h3 class="text-xl font-black text-gray-800">回答を送信しました</h3>
        ${name ? `<p class="text-gray-500 font-bold">#${escHtml(jersey)} ${escHtml(name)}</p>` : ''}
        <p class="text-gray-400 text-sm">ありがとうございました</p>
        <button type="button" onclick="renderRespondForm('${eventId}')"
          class="w-full bg-red-500 hover:bg-red-600 text-white font-black py-3 rounded-2xl text-base transition-colors">
          👨‍👩‍👦 兄弟・別の選手の回答をする
        </button>
        <button type="button" onclick="renderRespondForm('${eventId}', '${jersey}')"
          class="mt-1 text-sm text-gray-400 underline">この背番号の回答を修正する</button>
      </div>`;
  }

  // ─── 接続設定 ─────────────────────────────────────────────────────────────
  function openSetupModal() {
    const cfg = loadConfig();
    if (cfg) {
      document.getElementById('setup-team-name').value = cfg.team_name || '';
      document.getElementById('setup-url').value       = cfg.supabase_url || '';
      document.getElementById('setup-anon-key').value  = cfg.supabase_anon_key || '';
    }
    document.getElementById('setup-status').classList.add('hidden');
    document.getElementById('setup-modal').classList.remove('hidden');
  }

  async function handleSetupSave() {
    const btn      = document.getElementById('setup-save-btn');
    const txt      = document.getElementById('setup-save-text');
    const load     = document.getElementById('setup-save-loading');
    const statusEl = document.getElementById('setup-status');

    const teamName = document.getElementById('setup-team-name').value.trim();
    const url      = document.getElementById('setup-url').value.trim();
    const key      = document.getElementById('setup-anon-key').value.trim();

    if (!teamName) { setStatus(statusEl, 'チーム名を入力してください', 'error'); return; }
    if (!url || !url.startsWith('https://')) { setStatus(statusEl, 'URLを正しく入力してください（https://...）', 'error'); return; }
    if (!key || !key.startsWith('eyJ'))       { setStatus(statusEl, 'anon キーを確認してください', 'error'); return; }

    btn.disabled = true; txt.classList.add('hidden'); load.classList.remove('hidden');
    setStatus(statusEl, '接続テスト中...', 'info');

    let testOk = false;
    try {
      const res = await fetch(`${url.replace(/\/$/, '')}/rest/v1/${TABLE_EVENTS}?select=id&limit=1`, {
        headers: { apikey: key, Authorization: `Bearer ${key}` }
      });
      if (res.status === 401 || res.status === 403) {
        setStatus(statusEl, '認証エラー：anon キーを確認してください', 'error');
      } else if (res.status === 404) {
        setStatus(statusEl, 'テーブルが見つかりません。先にSQLを実行してください', 'error');
      } else {
        testOk = true;
      }
    } catch(e) {
      setStatus(statusEl, '接続できませんでした。URLを確認してください', 'error');
    }

    btn.disabled = false; txt.classList.remove('hidden'); load.classList.add('hidden');
    if (!testOk) return;

    const cfg = { team_name: teamName, supabase_url: url.replace(/\/$/, ''), supabase_anon_key: key, primary_color: '#c0392b' };
    saveConfig(cfg);
    applyConfig(cfg);
    supabaseClient = null;
    initSupabase();

    setStatus(statusEl, '✅ 接続OK！保存しました', 'success');
    setTimeout(async () => {
      document.getElementById('setup-modal').classList.add('hidden');
      await loadPlayersMap();
      await loadEvents();
    }, 800);
  }

  // ─── ユーティリティ ───────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      return new Date(dateStr + 'T00:00:00').toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
    } catch(e) { return dateStr; }
  }

  function setStatus(el, msg, type) {
    const cls = { error:'bg-red-50 border border-red-200 text-red-700', success:'bg-green-50 border border-green-200 text-green-700', info:'bg-blue-50 border border-blue-200 text-blue-700' };
    el.className = `text-sm rounded-xl px-4 py-3 font-medium ${cls[type] || cls.info}`;
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  function showFatalError(msg) {
    document.getElementById('respond-view').innerHTML = `
      <div class="bg-white rounded-2xl shadow p-10 text-center space-y-3">
        <div class="text-5xl">⚠️</div>
        <p class="text-gray-600 font-bold">${msg}</p>
      </div>`;
    document.getElementById('respond-view').classList.remove('hidden');
    document.getElementById('loading-screen').classList.add('hidden');
  }

  // ─── 起動 ─────────────────────────────────────────────────────────────────
  (async () => {
    try {
      // 保護者：個別イベント回答モード
      if (isRespondMode) {
        await initRespondMode();
        document.getElementById('loading-screen').classList.add('hidden');
        return;
      }

      // 保護者：イベント一覧モード
      if (isParentMode) {
        await initParentMode();

        // 「戻る」ボタン
        document.getElementById('back-to-list-btn').addEventListener('click', () => {
          document.getElementById('respond-view').classList.add('hidden');
          document.getElementById('back-to-list-btn').classList.add('hidden');
          document.getElementById('parent-list-view').classList.remove('hidden');
          window.scrollTo(0, 0);
        });

        document.getElementById('loading-screen').classList.add('hidden');
        return;
      }

      // 管理者モード
      document.getElementById('settings-btn').addEventListener('click', openSetupModal);
      document.getElementById('create-event-btn').addEventListener('click', () => openCreateEventModal());
      document.getElementById('save-event-btn').addEventListener('click', saveEvent);
      document.getElementById('setup-save-btn').addEventListener('click', handleSetupSave);

      const cfg = loadConfig();
      document.getElementById('admin-view').classList.remove('hidden');

      if (cfg?.supabase_url) {
        applyConfig(cfg);
        if (initSupabase()) {
          await loadPlayersMap();
          await loadEvents();
        }
      } else {
        openSetupModal();
      }
    } catch(e) {
      console.error('起動エラー:', e);
    } finally {
      document.getElementById('loading-screen').classList.add('hidden');
    }
  })();
</script>
</body>
</html>
